                }
                const data = await response.json();

                console.log(`已加载 ${celebrityFeatures.length} 位明星的特征`);
            } catch (err) {

                        return;
                    }

                    const reader = new FileReader();
                    reader.onload = async (event) => {
                        preview.src = event.target.result;
                        preview.style.display = 'block';

        async function loadModel() {
            try {
                console.log('正在加载AI模型...');

                        runtime: 'tfjs',
                        refineLandmarks: true,
                        maxFaces: 1

        async function analyzeImage(imageSrc) {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const results = document.getElementById('results');

            if (celebrityFeatures.length === 0) {
                showError('明星特征数据未加载，无法进行对比');
                return;
            }

            loading.style.display = 'block';
            error.textContent = '';
            results.style.display = 'none';

            try {
                if (!model) {
                    await loadModel();
                }

                // 创建图片对象
                const img = new Image();
                img.src = imageSrc;
                await new Promise((resolve) => { img.onload = resolve; });

                // 检测人脸特征点
                const faces = await model.estimateFaces(img);

                if (faces.length === 0) {
                    throw new Error('未检测到人脸，请上传正面清晰照片');

        function extractFaceDescriptor(face) {

            const keypoints = face.keypoints;
            const descriptor = [];
            
            // 选取关键特征点（眼睛、鼻子、嘴巴、轮廓）
            const keyIndices = [
                // 眼睛
                33, 133, 159, 145, 153, 154, 155, 246,  // 左眼
                263, 362, 386, 374, 380, 381, 382, 466, // 右眼
                // 鼻子
                1, 2, 98, 327, 168, 195, 5, 4, 51, 281,
                // 嘴巴
                61, 185, 40, 39, 37, 0, 267, 269, 270, 409,
                291, 375, 321, 405, 314, 17, 84, 181, 91, 146,
                // 脸部轮廓
                10, 338, 297, 332, 284, 251, 389, 356, 454, 323,
                361, 288, 397, 365, 379, 378, 400, 377, 152, 148,
                // 眉毛
                70, 63, 105, 66, 107, 336, 296, 334, 293, 300,
                // 其他关键点
                127, 162, 21, 54, 103, 67, 109, 234, 93, 132
            ];
            
            for (const idx of keyIndices) {
                if (keypoints[idx]) {
                    descriptor.push(keypoints[idx].x / 1000); // 归一化
                    descriptor.push(keypoints[idx].y / 1000);
                } else {
                    descriptor.push(0, 0);
                }
            }
            
            // 填充到128维
            while (descriptor.length < 128) {
                descriptor.push(0);
            }
            
            return descriptor.slice(0, 128);
        }

        function compareFeatures(userFeatures) {
            const matches = [];
            
            // 先计算所有距离
            for (const celeb of celebrityFeatures) {
                const distance = euclideanDistance(userFeatures, celeb.descriptor);
                matches.push({
                    name: celeb.name,
                    image: '女明星照片/' + celeb.imagePath,
                    rawDistance: distance
                });
            }
            
            // 按距离排序（距离越小越相似）
            matches.sort((a, b) => a.rawDistance - b.rawDistance);
            
            // 智能分层：让第一名明显高于其他人
            const minDist = matches[0].rawDistance;
            const maxDist = matches[matches.length - 1].rawDistance;
            const range = maxDist - minDist || 1; // 避免除以0
            
            // 分配相似度（有层次感）
            const top5 = matches.slice(0, 5);
            const similarityTiers = [
                { min: 88, max: 96 },  // 第1名：88-96%
                { min: 75, max: 85 },  // 第2名：75-85%
                { min: 65, max: 74 },  // 第3名：65-74%
                { min: 55, max: 64 },  // 第4名：55-64%
                { min: 45, max: 54 }   // 第5名：45-54%
            ];
            
            return top5.map((match, index) => {
                const tier = similarityTiers[index] || similarityTiers[4];
                // 在区间内随机，但保持递减趋势
                const baseSim = tier.min + Math.random() * (tier.max - tier.min);
                return {
                    name: match.name,
                    image: match.image,
                    similarity: Math.round(baseSim)
                };
            });
        }

        function euclideanDistance(a, b) {
            let sum = 0;
            for (let i = 0; i < Math.min(a.length, b.length); i++) {
                sum += Math.pow(a[i] - b[i], 2);
            }
            return Math.sqrt(sum);
        }

            const mainName = document.getElementById('main-name');
            const otherResults = document.getElementById('other-results');

            const topMatch = matches[0];
            
            mainPercent.textContent = topMatch.similarity + '%';
            mainImage.src = topMatch.image;
            mainImage.onerror = () => {

            };
            mainName.textContent = topMatch.name;

                features: ['独特的眉眼', '精致的五官', '迷人的气质'],

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>甄嬛传人物测试 · 你是后宫中的谁？</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
            background: #0c0a14;
            min-height: 100vh;
            color: #e8ddd0;
            overflow-x: hidden;
        }
        canvas#bg {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 0;
        }
        section { display: none; position: relative; z-index: 1; min-height: 100vh;
            justify-content: center; align-items: center; padding: 20px; }
        section.active { display: flex; }

        /* ===== 欢迎页 ===== */
        .welcome-box {
            background: rgba(60,20,20,0.35);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 52px 36px 42px;
            max-width: 520px; width: 100%;
            text-align: center;
            border: 1px solid rgba(200,160,100,0.15);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(200,160,100,0.1);
            animation: fadeSlideIn 0.7s ease;
        }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .emoji-row { font-size: 36px; margin-bottom: 18px; letter-spacing: 6px; }
        .welcome-box h1 {
            font-size: 30px; margin-bottom: 10px;
            background: linear-gradient(135deg, #d4a574, #c0392b, #8b0000, #d4a574);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-size: 300% 300%;
            animation: gradientShift 5s ease infinite;
        }
        @keyframes gradientShift {
            0%,100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .welcome-box .subtitle {
            font-size: 15px; color: rgba(200,160,100,0.6); margin-bottom: 8px; font-style: italic;
        }
        .welcome-box p { color: rgba(232,221,208,0.5); line-height: 1.7; margin-bottom: 32px; font-size: 14px; }
        .start-btn {
            display: inline-block; padding: 16px 52px; border-radius: 50px;
            border: none; font-size: 17px; font-weight: 600; color: #f5e6d0;
            background: linear-gradient(135deg, #8b0000 0%, #c0392b 50%, #d4a574 100%);
            cursor: pointer; transition: all 0.4s ease;
            box-shadow: 0 8px 30px rgba(139,0,0,0.35);
            position: relative; overflow: hidden;
        }
        .start-btn::before {
            content:''; position:absolute; top:0; left:-100%; width:100%; height:100%;
            background: linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
            transition: left 0.5s;
        }
        .start-btn:hover::before { left:100%; }
        .start-btn:hover { transform: translateY(-3px); box-shadow: 0 14px 40px rgba(139,0,0,0.5); }

        /* ===== 答题页 ===== */
        .quiz-container {
            background: rgba(60,20,20,0.3);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 40px 32px;
            max-width: 620px; width: 100%;
            border: 1px solid rgba(200,160,100,0.12);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            animation: fadeSlideIn 0.5s ease;
        }
        .progress-bar { height: 4px; background: rgba(200,160,100,0.1); border-radius: 2px; margin-bottom: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #8b0000, #d4a574); border-radius: 2px; transition: width 0.4s ease; width: 0; }
        .progress-num { font-size: 13px; color: rgba(200,160,100,0.4); text-align: right; margin-bottom: 24px; }
        .question-text { font-size: 19px; font-weight: 600; line-height: 1.7; margin-bottom: 28px; color: #f0e0cc; }
        .options-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }
        .option-card {
            padding: 16px 20px; border-radius: 16px;
            background: rgba(200,160,100,0.04);
            border: 1.5px solid rgba(200,160,100,0.1);
            cursor: pointer; transition: all 0.3s ease;
            font-size: 15px; line-height: 1.5; color: rgba(232,221,208,0.7);
        }
        .option-card:hover { background: rgba(139,0,0,0.12); border-color: rgba(200,160,100,0.3); color: #f0e0cc; }
        .option-card.selected {
            background: rgba(139,0,0,0.2); border-color: rgba(200,160,100,0.5);
            color: #f5e6d0; box-shadow: 0 4px 20px rgba(139,0,0,0.2);
        }
        .quiz-nav {
            display: flex; justify-content: space-between; align-items: center;
        }
        .back-btn {
            background: none; border: 1px solid rgba(200,160,100,0.15);
            color: rgba(200,160,100,0.45); padding: 10px 22px;
            border-radius: 30px; font-size: 13px; cursor: pointer; transition: all 0.3s;
        }
        .back-btn:hover { color: rgba(200,160,100,0.8); border-color: rgba(200,160,100,0.35); }
        .back-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .next-btn {
            padding: 10px 28px; border-radius: 30px; border: none;
            font-size: 14px; font-weight: 600; color: #f5e6d0;
            background: linear-gradient(135deg, #8b0000, #c0392b);
            cursor: pointer; transition: all 0.3s;
            opacity: 0.3; pointer-events: none;
        }
        .next-btn.enabled { opacity: 1; pointer-events: auto; }
        .next-btn.enabled:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(139,0,0,0.4); }

        /* ===== 加载页 ===== */
        .loading-box { text-align: center; animation: fadeSlideIn 0.5s ease; }
        .loading-circle { position: relative; width: 120px; height: 120px; margin: 0 auto 28px; }
        .loading-circle svg { transform: rotate(-90deg); }
        .loading-circle .ring-bg { fill: none; stroke: rgba(200,160,100,0.08); stroke-width: 6; }
        .loading-circle .ring-fg { fill: none; stroke: url(#grad1); stroke-width: 6; stroke-linecap: round;
            stroke-dasharray: 314; stroke-dashoffset: 314; transition: stroke-dashoffset 0.8s ease; }
        .loading-pct { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            font-size: 24px; font-weight: 700; color: #d4a574; }
        .loading-steps { list-style: none; text-align: left; max-width: 280px; margin: 0 auto; }
        .loading-steps li { padding: 10px 0; font-size: 14px; color: rgba(232,221,208,0.3);
            border-bottom: 1px solid rgba(200,160,100,0.06); transition: all 0.4s; display: flex; align-items: center; gap: 10px; }
        .loading-steps li .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(200,160,100,0.15); transition: all 0.4s; flex-shrink: 0; }
        .loading-steps li.current { color: rgba(232,221,208,0.85); }
        .loading-steps li.current .dot { background: #d4a574; box-shadow: 0 0 8px rgba(212,165,116,0.5); }
        .loading-steps li.done { color: rgba(232,221,208,0.4); }
        .loading-steps li.done .dot { background: #c0392b; }

        /* 判定依据 */
        .evidence-list { list-style: none; }
        .evidence-list li {
            padding: 12px 16px; margin-bottom: 8px; font-size: 14px;
            color: rgba(232,221,208,0.75); line-height: 1.6;
            background: rgba(200,160,100,0.04); border-radius: 12px;
            border-left: 3px solid rgba(200,160,100,0.3);
        }
        .evidence-list li .ev-q {
            font-size: 12px; color: rgba(200,160,100,0.4); display: block; margin-bottom: 4px;
        }
        .evidence-list li .ev-trait {
            color: #d4a574; font-weight: 600;
        }

        /* ===== 结果页 ===== */
        .result-container { max-width: 640px; width: 100%; animation: fadeSlideIn 0.7s ease; }
        .result-hero {
            border-radius: 28px; padding: 48px 32px 36px; text-align: center;
            margin-bottom: 20px; position: relative; overflow: hidden;
        }
        .result-hero::before {
            content:''; position:absolute; top:0;left:0;right:0;bottom:0;
            background: inherit; filter: blur(40px); opacity: 0.3; z-index: 0;
        }
        .result-hero > * { position: relative; z-index: 1; }
        .result-portrait {
            width: 160px; height: 160px; border-radius: 50%;
            object-fit: cover; margin-bottom: 16px;
            border: 3px solid rgba(245,230,208,0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            animation: float 3s ease-in-out infinite;
        }
        .result-emoji { font-size: 64px; margin-bottom: 12px; display: block; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .result-hero h2 { font-size: 28px; color: #f5e6d0; margin-bottom: 8px; }
        .result-hero .tagline { font-size: 15px; color: rgba(245,230,208,0.7); line-height: 1.7; }
        .result-hero .quote { font-size: 13px; color: rgba(245,230,208,0.5); margin-top: 12px; font-style: italic; }

        .card {
            background: rgba(60,20,20,0.25); backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px; padding: 28px 24px;
            border: 1px solid rgba(200,160,100,0.1);
            margin-bottom: 16px; animation: cardReveal 0.5s ease backwards;
        }
        @keyframes cardReveal { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .card h3 { font-size: 16px; margin-bottom: 16px; color: #d4a574; }
        .traits-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .trait-col h4 { font-size: 13px; color: rgba(200,160,100,0.5); margin-bottom: 10px; letter-spacing: 1px; }
        .trait-col li { font-size: 14px; color: rgba(232,221,208,0.7); padding: 4px 0; list-style: none; }
        .strength li::before { content: '✦'; color: #d4a574; margin-right: 6px; }
        .weakness li::before { content: '⚠'; color: #c0392b; margin-right: 6px; }

        .radar-wrap { display: flex; justify-content: center; margin: 8px 0; }
        .legend { margin-top: 12px; }
        .legend-item { display: flex; align-items: center; gap: 10px; padding: 8px 0;
            border-bottom: 1px solid rgba(200,160,100,0.06); font-size: 14px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .legend-bar { flex: 1; height: 6px; border-radius: 3px; background: rgba(200,160,100,0.08); overflow: hidden; }
        .legend-bar-fill { height: 100%; border-radius: 3px; transition: width 1s ease; }
        .legend-pct { font-size: 13px; color: rgba(232,221,208,0.5); min-width: 36px; text-align: right; }

        .tips-list { list-style: none; }
        .tips-list li { padding: 10px 0; font-size: 14px; color: rgba(232,221,208,0.7); line-height: 1.6;
            border-bottom: 1px solid rgba(200,160,100,0.06); }
        .tips-list li:last-child { border: none; }
        .tips-list li::before { content: '📜'; margin-right: 8px; }

        .secondary-hint {
            font-size: 14px; color: rgba(232,221,208,0.5); text-align: center;
            padding: 16px; margin-bottom: 16px; line-height: 1.6;
            background: rgba(60,20,20,0.2); border-radius: 16px;
        }
        .disclaimer {
            font-size: 12px; color: rgba(200,160,100,0.25); text-align: center;
            padding: 16px 0; line-height: 1.6;
        }
        .action-row { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }
        .action-btn {
            padding: 14px 32px; border-radius: 50px; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.3s; border: none;
        }
        .btn-share { background: linear-gradient(135deg, #8b0000, #c0392b); color: #f5e6d0; }
        .btn-share:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(139,0,0,0.4); }
        .btn-restart { background: rgba(200,160,100,0.08); color: rgba(200,160,100,0.6); border: 1px solid rgba(200,160,100,0.12); }
        .btn-restart:hover { color: #d4a574; border-color: rgba(200,160,100,0.3); }

        @media (max-width: 480px) {
            .welcome-box { padding: 36px 24px 32px; }
            .welcome-box h1 { font-size: 24px; }
            .quiz-container { padding: 28px 20px; }
            .question-text { font-size: 17px; }
            .result-hero { padding: 36px 20px 28px; }
            .result-portrait { width: 120px; height: 120px; }
            .traits-grid { grid-template-columns: 1fr; }
            .action-row { flex-direction: column; }
            .action-btn { width: 100%; }
        }
    </style>
</head>
<body>
    <canvas id="bg"></canvas>

    <!-- 欢迎页 -->
    <section id="welcome" class="active">
        <div class="welcome-box">
            <div class="emoji-row">👑 🏯 🌸 🎭</div>
            <h1>你是甄嬛传里的谁？</h1>
            <div class="subtitle">「愿得一心人，白首不相离」</div>
            <p>20 道日常情境题，测出你骨子里的后宫人格<br>是运筹帷幄的甄嬛，还是霸气侧漏的华妃？</p>
            <button class="start-btn" onclick="startQuiz()">开始测试 →</button>
        </div>
    </section>

    <!-- 答题页 -->
    <section id="quiz">
        <div class="quiz-container">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-num" id="progressNum">Q1 / 20</div>
            <div class="question-text" id="questionText"></div>
            <div class="options-list" id="optionsList"></div>
            <div class="quiz-nav">
                <button class="back-btn" id="backBtn" onclick="goBack()" disabled>← 上一题</button>
                <button class="next-btn" id="nextBtn" onclick="goNext()">下一题 →</button>
            </div>
        </div>
    </section>

    <!-- 加载页 -->
    <section id="loading">
        <div class="loading-box">
            <div class="loading-circle">
                <svg width="120" height="120" viewBox="0 0 120 120">
                    <defs><linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#8b0000"/>
                        <stop offset="100%" style="stop-color:#d4a574"/>
                    </linearGradient></defs>
                    <circle class="ring-bg" cx="60" cy="60" r="50"/>
                    <circle class="ring-fg" id="ringFg" cx="60" cy="60" r="50"/>
                </svg>
                <div class="loading-pct" id="loadingPct">0%</div>
            </div>
            <ul class="loading-steps">
                <li id="ls1"><span class="dot"></span>正在翻阅你的后宫档案...</li>
                <li id="ls2"><span class="dot"></span>正在匹配人物命格...</li>
                <li id="ls3"><span class="dot"></span>正在撰写你的判词...</li>
            </ul>
        </div>
    </section>

    <!-- 结果页 -->
    <section id="result">
        <div class="result-container">
            <div class="result-hero" id="resultHero">
                <img class="result-portrait" id="resultPortrait" src="" alt="">
                <span class="result-emoji" id="resultEmoji"></span>
                <h2 id="resultName"></h2>
                <p class="tagline" id="resultTagline"></p>
                <p class="quote" id="resultQuote"></p>
            </div>
            <div class="card" style="animation-delay:0.1s">
                <h3>🔎 判定依据 · 你的这些表现暴露了你</h3>
                <ul class="evidence-list" id="evidenceList"></ul>
            </div>
            <div class="card" style="animation-delay:0.15s">
                <h3>🔍 性格画像</h3>
                <div class="traits-grid">
                    <div class="trait-col strength"><h4>✦ 你的利刃</h4><ul id="strengthList"></ul></div>
                    <div class="trait-col weakness"><h4>⚠ 你的软肋</h4><ul id="weaknessList"></ul></div>
                </div>
            </div>
            <div class="card" style="animation-delay:0.2s">
                <h3>📊 后宫人格分布</h3>
                <div class="radar-wrap"><canvas id="radarCanvas" width="320" height="320"></canvas></div>
                <div class="legend" id="legend"></div>
            </div>
            <div class="card" style="animation-delay:0.3s">
                <h3>📜 生存锦囊</h3>
                <ul class="tips-list" id="tipsList"></ul>
            </div>
            <div class="secondary-hint" id="secondaryType" style="display:none"></div>
            <div class="disclaimer">⚠️ 本测试仅供娱乐，不代表真实性格诊断<br>「人心都是肉长的，经不起太多试探」</div>
            <div class="action-row">
                <button class="action-btn btn-share" onclick="shareResult()">分享结果</button>
                <button class="action-btn btn-restart" onclick="restartQuiz()">重新测试</button>
            </div>
        </div>
    </section>

    <script>
    /* ===== 粒子背景（宫廷暗红金色调） ===== */
    var cvs = document.getElementById('bg'), cx = cvs.getContext('2d'), pts = [];
    function resizeCvs(){ cvs.width=innerWidth; cvs.height=innerHeight; }
    function makePts(){
        pts=[];
        var n=Math.floor((cvs.width*cvs.height)/20000);
        for(var i=0;i<n;i++){
            var hue = 10 + Math.random()*30;
            pts.push({x:Math.random()*cvs.width,y:Math.random()*cvs.height,
                vx:(Math.random()-0.5)*0.25,vy:(Math.random()-0.5)*0.25,r:Math.random()*2+0.5,
                color:'hsla('+hue+',60%,55%,'+(0.06+Math.random()*0.12)+')'});
        }
    }
    function drawBg(){
        cx.clearRect(0,0,cvs.width,cvs.height);
        pts.forEach(function(p){
            p.x+=p.vx;p.y+=p.vy;
            if(p.x<0||p.x>cvs.width)p.vx*=-1;
            if(p.y<0||p.y>cvs.height)p.vy*=-1;
            cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fillStyle=p.color;cx.fill();
        });
        for(var i=0;i<pts.length;i++)for(var j=i+1;j<pts.length;j++){
            var dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
            if(d<100){cx.beginPath();cx.moveTo(pts[i].x,pts[i].y);cx.lineTo(pts[j].x,pts[j].y);
                cx.strokeStyle='rgba(200,160,100,'+(0.04*(1-d/100))+')';cx.lineWidth=0.5;cx.stroke();}
        }
        requestAnimationFrame(drawBg);
    }
    resizeCvs();makePts();drawBg();
    addEventListener('resize',function(){resizeCvs();makePts();});

    /* ===== 题目数据 ===== */
    // A=甄嬛 B=华妃 C=沈眉庄 D=安陵容 E=皇后 F=敬妃 G=夏冬春 H=三阿哥 I=宁贵人
    var questions = [
        {text:'公司团建分组，你和一个跟你有过节的同事被分到一组，你会？',options:[
            {text:'表面和气配合，暗中观察对方意图，找机会化敌为友',type:'A',trait:'善于隐藏真实想法，化敌为友'},
            {text:'直接跟组织者说换组，懒得跟不喜欢的人虚与委蛇',type:'B',trait:'不愿委屈自己，态度直接'},
            {text:'保持距离，做好自己分内的事就行，不主动交集',type:'C',trait:'边界感强，不在无意义的人身上花精力'},
            {text:'笑脸迎人格外热情，但心里把每句话都记得清清楚楚',type:'E',trait:'表面慈和内心记账，城府深'},
            {text:'完全不记得之前有过节，热情地打招呼开始团建',type:'H',trait:'心大到忘记恩怨，对谁都没有防备心'},
            {text:'当众大声抱怨"怎么跟TA一组啊！"完全不考虑场面',type:'G',trait:'想到什么说什么，完全不过脑子'}]},

        {text:'闺蜜聚会时，有人当众开了一个让你很不舒服的玩笑，你？',options:[
            {text:'笑着用更巧妙的话怼回去，让对方知道你不好惹',type:'A',trait:'反应快，用智慧而非蛮力反击'},
            {text:'当场翻脸："你再说一次试试？"',type:'B',trait:'情绪来了挡不住，敢当场翻脸'},
            {text:'不笑也不说话，散场后跟她挑明：以后别这样',type:'C',trait:'不当众撕破脸，但事后会把话说清楚'},
            {text:'笑着附和，回家后越想越难过，在日记里写下来',type:'D',trait:'习惯隐忍不表达，独自消化情绪'},
            {text:'没听懂这个玩笑在笑自己，还跟着一起哈哈大笑',type:'G',trait:'反应慢半拍，完全不知道被嘲笑了'},
            {text:'笑着说"你说得对"然后继续聊自己想聊的话题',type:'I',trait:'别人的话影响不了自己的节奏'}]},

        {text:'你发现一个同事一直在背后说你坏话，你怎么处理？',options:[
            {text:'不动声色地收集证据，等合适的时机一次让TA没话说',type:'A',trait:'不打无准备之仗，讲究时机'},
            {text:'直接当面对质：有本事当我面说',type:'B',trait:'眼里揉不得沙子，正面硬刚'},

    /* ===== 状态 ===== */
    var allTypes = ['A','B','C','D','E','F','G','H','I'];
    var currentQ = 0;
    var answers = new Array(20).fill(null);
    var scores = {};
    allTypes.forEach(function(t){ scores[t]=0; });
    var shuffledOptions = [];

    function shuffle(arr) {
        var a = arr.slice();
        for (var i=a.length-1;i>0;i--) {
            var j=Math.floor(Math.random()*(i+1));
            var tmp=a[i];a[i]=a[j];a[j]=tmp;
        }
        return a;
    }

    /* ===== 流程 ===== */
    function showSection(id) {
        document.querySelectorAll('section').forEach(function(s){ s.classList.remove('active'); });
        document.getElementById(id).classList.add('active');
    }

    function startQuiz() {
        currentQ = 0;
        answers = new Array(20).fill(null);
        scores = {};
        allTypes.forEach(function(t){ scores[t]=0; });
        shuffledOptions = questions.map(function(q){ return shuffle(q.options); });
        showSection('quiz');
        renderQuestion(0);
    }

    function renderQuestion(idx) {
        currentQ = idx;
        var q = questions[idx];
        document.getElementById('progressNum').textContent = 'Q'+(idx+1)+' / 20';
        document.getElementById('progressFill').style.width = ((idx)/20*100)+'%';
        document.getElementById('questionText').textContent = q.text;
        document.getElementById('backBtn').disabled = idx === 0;

        var nextBtn = document.getElementById('nextBtn');
        if (answers[idx] !== null) {
            nextBtn.classList.add('enabled');
            nextBtn.textContent = idx < 19 ? '下一题 →' : '查看判词 →';
        } else {
            nextBtn.classList.remove('enabled');
            nextBtn.textContent = idx < 19 ? '下一题 →' : '查看判词 →';
        }

        var list = document.getElementById('optionsList');
        list.innerHTML = '';
        var opts = shuffledOptions[idx];
        opts.forEach(function(opt) {
            var div = document.createElement('div');
            div.className = 'option-card' + (answers[idx] === opt.type ? ' selected' : '');
            div.textContent = opt.text;
            div.onclick = function() { selectOption(idx, opt.type, this); };
            list.appendChild(div);
        });
    }

    function selectOption(idx, type, el) {
        if (answers[idx] !== null) scores[answers[idx]]--;
        answers[idx] = type;
        scores[type]++;
        document.querySelectorAll('.option-card').forEach(function(c){ c.classList.remove('selected'); });
        el.classList.add('selected');
        var nextBtn = document.getElementById('nextBtn');
        nextBtn.classList.add('enabled');
        nextBtn.textContent = idx < 19 ? '下一题 →' : '查看判词 →';
    }

    function goNext() {
        if (answers[currentQ] === null) return;
        if (currentQ < 19) renderQuestion(currentQ + 1);
        else startLoading();
    }

    function goBack() {
        if (currentQ > 0) renderQuestion(currentQ - 1);
    }

    /* ===== 加载 ===== */
    function startLoading() {
        showSection('loading');
        var steps = [
            {id:'ls1',pct:30,dur:900},
            {id:'ls2',pct:65,dur:1000},
            {id:'ls3',pct:100,dur:800}
        ];
        var si = 0;
        function nextStep() {
            if (si > 0) document.getElementById(steps[si-1].id).className = 'done';
            if (si < steps.length) {
                var s = steps[si];
                document.getElementById(s.id).className = 'current';
                document.getElementById('ringFg').style.strokeDashoffset = 314 - (314 * s.pct / 100);
                document.getElementById('loadingPct').textContent = s.pct + '%';
                si++;
                setTimeout(nextStep, s.dur);
            } else {
                setTimeout(showResult, 400);
            }
        }
        nextStep();
    }

    /* ===== 计算 ===== */
    function calculateResult() {
        var priority = allTypes;
        var maxScore = -1, winner = 'A';
        for (var i=0;i<priority.length;i++) {
            if (scores[priority[i]] > maxScore) { maxScore = scores[priority[i]]; winner = priority[i]; }
        }
        var secondMax = -1, second = null;
        for (var i=0;i<priority.length;i++) {
            var t = priority[i];
            if (t !== winner && scores[t] > secondMax) { secondMax = scores[t]; second = t; }
        }
        return { primary: winner, secondary: second };
    }

    /* ===== 结果 ===== */
    function showResult() {
        var res = calculateResult();
        var r = typeResults[res.primary];
        var s = res.secondary ? typeResults[res.secondary] : null;

        ['ls1','ls2','ls3'].forEach(function(id){ document.getElementById(id).className = ''; });
        document.getElementById('ringFg').style.strokeDashoffset = 314;
        document.getElementById('loadingPct').textContent = '0%';

        showSection('result');
        document.getElementById('resultHero').style.background = r.gradient;
        document.getElementById('resultPortrait').src = r.image;
        document.getElementById('resultPortrait').alt = r.name;
        document.getElementById('resultEmoji').textContent = r.emoji;
        document.getElementById('resultName').textContent = '你是 · ' + r.name;
        document.getElementById('resultTagline').textContent = r.tagline;
        document.getElementById('resultQuote').textContent = r.quote;

        // -- 判定依据
        var evidences = [];
        for (var i = 0; i < 20; i++) {
            if (answers[i] === res.primary) {
                var q = questions[i];
                var opts = q.options;
                for (var j = 0; j < opts.length; j++) {
                    if (opts[j].type === res.primary) {
                        evidences.push({ qIdx: i, qText: q.text, trait: opts[j].trait });
                        break;
                    }
                }
            }
        }
        var evList = document.getElementById('evidenceList');
        evList.innerHTML = '';
        evidences.forEach(function(ev) {
            var li = document.createElement('li');
            li.innerHTML = '<span class="ev-q">Q' + (ev.qIdx + 1) + ' ' + ev.qText + '</span>' +
                '你的表现 → <span class="ev-trait">' + ev.trait + '</span>';
            evList.appendChild(li);
        });

        var sl = document.getElementById('strengthList'); sl.innerHTML = '';
        r.strengths.forEach(function(t){ var li=document.createElement('li');li.textContent=t;sl.appendChild(li); });
        var wl = document.getElementById('weaknessList'); wl.innerHTML = '';
        r.weaknesses.forEach(function(t){ var li=document.createElement('li');li.textContent=t;wl.appendChild(li); });
        var tl = document.getElementById('tipsList'); tl.innerHTML = '';
        r.tips.forEach(function(t){ var li=document.createElement('li');li.textContent=t;tl.appendChild(li); });

        var total = 20;
        var pcts = {};
        allTypes.forEach(function(k){ pcts[k] = Math.round(scores[k]/total*100); });
        drawRadar(pcts);
        renderLegend(pcts);

        if (s && scores[res.secondary] > 0) {
            document.getElementById('secondaryType').style.display = 'block';
            document.getElementById('secondaryType').innerHTML =
                '你身上也有 <strong>'+s.emoji+' '+s.name+'</strong> 的影子——'+s.secondaryHint;
        } else {
            document.getElementById('secondaryType').style.display = 'none';
        }
    }

    /* ===== 雷达图（9轴） ===== */
    function drawRadar(pcts) {
        var canvas = document.getElementById('radarCanvas');
        var c = canvas.getContext('2d');
        var W=320,H=320,cxR=W/2,cyR=H/2,R=100;
        c.clearRect(0,0,W,H);
        var keys = allTypes;
        var labels=['👑甄嬛','🔥华妃','🏔️眉庄','🎭陵容','🐍皇后','🌙敬妃','🐔冬春','🐑三阿哥','🦋宁贵人'];
        var colors=['#c0392b','#ff6f00','#607d8b','#7b1fa2','#283593','#00695c','#e65100','#4caf50','#e91e63'];
        var n=9, step=Math.PI*2/n, startA=-Math.PI/2;

        for(var ring=1;ring<=4;ring++){
            var rr=R*ring/4;
            c.beginPath();
            for(var i=0;i<=n;i++){
                var a=startA+step*(i%n);
                var px=cxR+Math.cos(a)*rr, py=cyR+Math.sin(a)*rr;
                if(i===0)c.moveTo(px,py);else c.lineTo(px,py);
            }
            c.closePath();c.strokeStyle='rgba(200,160,100,'+(ring===4?0.12:0.05)+')';c.lineWidth=1;c.stroke();
        }
        for(var i=0;i<n;i++){
            var a=startA+step*i;
            c.beginPath();c.moveTo(cxR,cyR);c.lineTo(cxR+Math.cos(a)*R,cyR+Math.sin(a)*R);
            c.strokeStyle='rgba(200,160,100,0.08)';c.stroke();
        }
        c.beginPath();
        for(var i=0;i<=n;i++){
            var idx=i%n;
            var v=Math.max(pcts[keys[idx]]/100,0.05);
            var a=startA+step*idx;
            if(i===0)c.moveTo(cxR+Math.cos(a)*R*v,cyR+Math.sin(a)*R*v);
            else c.lineTo(cxR+Math.cos(a)*R*v,cyR+Math.sin(a)*R*v);
        }
        c.closePath();c.fillStyle='rgba(192,57,43,0.15)';c.fill();
        c.strokeStyle='rgba(192,57,43,0.6)';c.lineWidth=2;c.stroke();

        for(var i=0;i<n;i++){
            var v=Math.max(pcts[keys[i]]/100,0.05);
            var a=startA+step*i;
            c.beginPath();c.arc(cxR+Math.cos(a)*R*v,cyR+Math.sin(a)*R*v,4,0,Math.PI*2);
            c.fillStyle=colors[i];c.fill();c.strokeStyle='#f5e6d0';c.lineWidth=1.5;c.stroke();
        }
        c.font='11px sans-serif';c.fillStyle='rgba(232,221,208,0.6)';c.textAlign='center';c.textBaseline='middle';
        for(var i=0;i<n;i++){
            var a=startA+step*i;
            c.fillText(labels[i],cxR+Math.cos(a)*(R+28),cyR+Math.sin(a)*(R+28));
        }
    }

    function renderLegend(pcts) {
        var items=[
            {emoji:'👑',name:'甄嬛',key:'A',color:'#c0392b'},
            {emoji:'🔥',name:'华妃',key:'B',color:'#ff6f00'},
            {emoji:'🏔️',name:'沈眉庄',key:'C',color:'#607d8b'},
            {emoji:'🎭',name:'安陵容',key:'D',color:'#7b1fa2'},
            {emoji:'🐍',name:'皇后',key:'E',color:'#283593'},
            {emoji:'🌙',name:'敬妃',key:'F',color:'#00695c'},
            {emoji:'🐔',name:'夏冬春',key:'G',color:'#e65100'},
            {emoji:'🐑',name:'三阿哥',key:'H',color:'#4caf50'},
            {emoji:'🦋',name:'宁贵人',key:'I',color:'#e91e63'}
        ];
        var box=document.getElementById('legend'); box.innerHTML='';
        items.forEach(function(it){
            var d=document.createElement('div');d.className='legend-item';
            d.innerHTML='<span class="legend-dot" style="background:'+it.color+'"></span>'+
                '<span style="min-width:80px;color:rgba(232,221,208,0.65)">'+it.emoji+' '+it.name+'</span>'+
                '<div class="legend-bar"><div class="legend-bar-fill" style="width:'+pcts[it.key]+'%;background:'+it.color+'"></div></div>'+
                '<span class="legend-pct">'+pcts[it.key]+'%</span>';
            box.appendChild(d);
        });
    }

    /* ===== 分享 & 重来 ===== */
    function shareResult() {
        var res = calculateResult();
        var r = typeResults[res.primary];
        var text = '【甄嬛传人物测试】\n我是'+r.emoji+' '+r.name+'！\n'+r.tagline+'\n你是后宫里的谁？快来测测 →';
        if (navigator.share) {
            navigator.share({title:'甄嬛传人物测试',text:text}).catch(function(){});
        } else {
            navigator.clipboard.writeText(text).then(function(){
                alert('已复制到剪贴板，分享给姐妹们吧！');
            });
        }
    }

    function restartQuiz() { showSection('welcome'); }
